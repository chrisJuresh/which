name: which

services:
  # Static origin: the built SPA (from the image) + the archive data/captures
  # bind-mounted from the host. Reached only via the shared Cloudflare Tunnel
  # (see ~/infra) and a loopback port for local health checks. The single
  # tunnel + Watchtower now live in the `infra` project, not here.
  web:
    container_name: which
    image: ghcr.io/chrisjuresh/which:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    volumes:
      - /srv/which/data:/site/data:ro
      - /srv/which/captures:/site/captures:ro
    ports:
      - "127.0.0.1:8099:80"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      a3server:
        # ingress target is http://web:80; 'which' also resolves (consistent name)
        aliases: [which, web]

networks:
  a3server:
    external: true
