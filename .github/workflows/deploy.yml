name: build-and-publish

# Builds the site into a container image and publishes it to GHCR.
# The server's Watchtower auto-pulls the new image — no SSH keys or secrets
# to manage (uses the built-in GITHUB_TOKEN).

on:
  push:
    branches: [main]
    paths:
      - 'archive-web/**'
      - 'deploy/Dockerfile'
      - 'deploy/Caddyfile'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ghcr.io/chrisjuresh/which:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
